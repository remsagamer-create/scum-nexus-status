<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SCUM Nexus - Status Bot</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; background: #1a1a2e; color: #eee; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p { color: #aaa; font-size: 14px; margin-top: 0; }
  #status { margin-top: 30px; background: #16213e; border-radius: 10px; padding: 20px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a4a; font-size: 15px; }
  .row:last-child { border-bottom: none; }
  .label { color: #aaa; }
  .value { font-weight: bold; }
  .online { color: #2ecc71; }
  .offline { color: #e74c3c; }
  #log { margin-top: 16px; font-size: 13px; color: #aaa; text-align: center; }
</style>
</head>
<body>

<h1>SCUM Nexus — Status Bot</h1>
<p>Envoie automatiquement le statut du serveur sur Discord toutes les 5 minutes.</p>

<div id="status">
  <div class="row"><span class="label">Statut</span><span class="value" id="s-status">Chargement...</span></div>
  <div class="row"><span class="label">Joueurs</span><span class="value" id="s-players">—</span></div>
  <div class="row"><span class="label">Rang BattleMetrics</span><span class="value" id="s-rank">—</span></div>
  <div class="row"><span class="label">Prochain restart</span><span class="value" id="s-restart">—</span></div>
</div>

<div id="log">Initialisation...</div>

<script>
const SERVER_ID = '39279411';
const WEBHOOK = 'https://discord.com/api/webhooks/1511820291775401984/RlL0eO0QQ2vbJv4RxGzr0qT3YVFhJsPMwWNF27JR9dfEkR5JmOJNwDdd1-HlShma938_';
const RESTART_TIME = '20:00';
const INTERVAL_MS = 5 * 60 * 1000;

function buildBar(current, max) {
  if (!max || max === '?') return '';
  const filled = Math.round((current / max) * 10);
  return '█'.repeat(filled) + '░'.repeat(10 - filled);
}

async function run() {
  const logEl = document.getElementById('log');
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers/${SERVER_ID}`);
    if (!res.ok) throw new Error('API indisponible');
    const data = await res.json();
    const attr = data.data.attributes;

    const online = attr.status === 'online';
    const players = attr.players ?? 0;
    const maxPlayers = attr.maxPlayers ?? '?';
    const rank = attr.rank ?? '?';
    const name = attr.name ?? 'SCUM Nexus';
    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    document.getElementById('s-status').textContent = online ? 'En ligne' : 'Hors ligne';
    document.getElementById('s-status').className = 'value ' + (online ? 'online' : 'offline');
    document.getElementById('s-players').textContent = `${players} / ${maxPlayers}`;
    document.getElementById('s-rank').textContent = `#${rank}`;
    document.getElementById('s-restart').textContent = RESTART_TIME;

    const bar = buildBar(players, maxPlayers);

    const payload = {
      username: 'SCUM Nexus Status',
      embeds: [{
        title: `${online ? '🟢' : '🔴'} ${name}`,
        color: online ? 0x2ecc71 : 0xe74c3c,
        fields: [
          { name: 'Joueurs', value: `\`${players} / ${maxPlayers}\`\n${bar}`, inline: true },
          { name: 'Rang BattleMetrics', value: `\`#${rank}\``, inline: true },
          { name: 'Prochain restart', value: `\`${RESTART_TIME}\``, inline: true },
        ],
        footer: { text: `Mis à jour à ${now}` }
      }]
    };

    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    logEl.textContent = `Dernière mise à jour : ${now} — prochain envoi dans 5 min`;
  } catch(e) {
    logEl.textContent = `Erreur : ${e.message}`;
  }
}

run();
setInterval(run, INTERVAL_MS);
</script>

</body>
</html>
